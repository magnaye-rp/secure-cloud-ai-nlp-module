<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #f7f6f3;
            --surface: #ffffff;
            --surface-alt: #f2f1ee;
            --border: #e8e6e1;
            --border-strong: #d4d0c8;
            --text: #1a1916;
            --text-secondary: #6b6760;
            --text-muted: #a09c94;
            --accent: #1a1916;
            --accent-light: #2d2b27;
            --user-bubble: #1a1916;
            --user-text: #f7f6f3;
            --success: #3d7a5a;
            --error-bg: #fdf3f2;
            --error-border: #e8c9c5;
            --error-text: #8b3a34;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Subtle texture */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(circle at 30% 20%, rgba(180,175,165,0.12) 0%, transparent 50%),
                radial-gradient(circle at 75% 75%, rgba(160,155,145,0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .chat-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            height: 90vh;
            max-height: 780px;
            background: var(--surface);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-md), 0 20px 60px rgba(0,0,0,0.06);
            animation: rise 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes rise {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Header ── */
        .header {
            padding: 20px 24px 18px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 14px;
            background: var(--surface);
        }

        .header-mark {
            width: 36px;
            height: 36px;
            background: var(--accent);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .header-mark svg {
            width: 18px;
            height: 18px;
            color: var(--bg);
        }

        .header-content {
            flex: 1;
        }

        .header-title {
            font-size: 15px;
            font-weight: 500;
            color: var(--text);
            letter-spacing: -0.01em;
        }

        .header-status {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: 300;
        }

        .status-indicator {
            width: 6px;
            height: 6px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.45; }
        }

        /* ── Auth ── */
        .auth-section {
            padding: 14px 24px;
            background: var(--surface-alt);
            border-bottom: 1px solid var(--border);
        }

        .auth-label {
            font-size: 10px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .auth-label svg {
            width: 11px;
            height: 11px;
        }

        .auth-input {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border-strong);
            border-radius: 10px;
            padding: 11px 14px;
            color: var(--text);
            font-size: 13px;
            font-family: 'DM Mono', monospace;
            font-weight: 300;
            letter-spacing: 0.04em;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .auth-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(26,25,22,0.07);
        }

        .auth-input::placeholder {
            color: var(--text-muted);
            font-family: 'DM Sans', sans-serif;
            font-weight: 300;
            letter-spacing: 0;
        }

        /* ── Messages ── */
        .messages {
            flex: 1;
            padding: 20px 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        .messages::-webkit-scrollbar { width: 4px; }
        .messages::-webkit-scrollbar-track { background: transparent; }
        .messages::-webkit-scrollbar-thumb {
            background: var(--border-strong);
            border-radius: 2px;
        }

        .msg {
            max-width: 78%;
            padding: 11px 16px;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.55;
            font-weight: 300;
            animation: msgIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes msgIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .user-msg {
            align-self: flex-end;
            background: var(--user-bubble);
            color: var(--user-text);
            border-bottom-right-radius: 4px;
            font-weight: 400;
        }

        .bot-msg {
            align-self: flex-start;
            background: var(--surface-alt);
            color: var(--text);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .bot-msg.error {
            background: var(--error-bg);
            border-color: var(--error-border);
            color: var(--error-text);
        }

        /* ── Typing ── */
        .typing-indicator {
            display: none;
            align-self: flex-start;
            background: var(--surface-alt);
            border: 1px solid var(--border);
            border-radius: 14px;
            border-bottom-left-radius: 4px;
            padding: 14px 18px;
            gap: 4px;
            align-items: center;
            animation: msgIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .typing-indicator.active { display: flex; }

        .typing-dot {
            width: 5px;
            height: 5px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s ease-in-out infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.16s; }
        .typing-dot:nth-child(3) { animation-delay: 0.32s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.35; }
            30%  { transform: translateY(-5px); opacity: 1; }
        }

        /* ── Input ── */
        .input-area {
            padding: 16px 24px 20px;
            border-top: 1px solid var(--border);
            background: var(--surface);
        }

        .chat-form {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .input-wrapper { flex: 1; }

        input[type="text"] {
            width: 100%;
            background: var(--surface-alt);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            color: var(--text);
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 300;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--border-strong);
            background: var(--surface);
            box-shadow: 0 0 0 3px rgba(26,25,22,0.05);
        }

        input[type="text"]::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            width: 44px;
            height: 44px;
            background: var(--accent);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
            box-shadow: var(--shadow-sm);
        }

        .send-btn:hover {
            background: var(--accent-light);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .send-btn:active {
            transform: translateY(0);
            box-shadow: var(--shadow-sm);
        }

        .send-btn svg {
            width: 17px;
            height: 17px;
            color: var(--bg);
            transition: transform 0.2s;
        }

        .send-btn:hover svg {
            transform: translateX(1px) translateY(-1px);
        }

        .status-bar {
            margin-top: 10px;
            font-size: 11px;
            color: var(--text-muted);
            font-family: 'DM Mono', monospace;
            font-weight: 300;
            letter-spacing: 0.02em;
            min-height: 14px;
            transition: opacity 0.3s;
        }

        @media (max-width: 520px) {
            body { padding: 0; }
            .chat-container {
                max-width: 100%;
                height: 100dvh;
                max-height: none;
                border-radius: 0;
                border: none;
                box-shadow: none;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">

        <div class="header">
            <div class="header-mark">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                </svg>
            </div>
            <div class="header-content">
                <div class="header-title">Secure Assistant</div>
                <div class="header-status">
                    <span class="status-indicator"></span>
                    Ready
                </div>
            </div>
        </div>

        <div class="auth-section">
            <div class="auth-label">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
                </svg>
                API Key
            </div>
            <input type="password" class="auth-input" id="api_key" placeholder="sk-ant-···">
        </div>

        <div class="messages" id="chatbox">
            <div class="msg bot-msg">Welcome. Enter your API key above to begin.</div>
        </div>

        <div class="typing-indicator" id="typing">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
        </div>

        <div class="input-area">
            <form class="chat-form" onsubmit="return sendMessage(event)">
                <div class="input-wrapper">
                    <input type="text" id="userInput" placeholder="Send a message…" autocomplete="off" required>
                </div>
                <button type="submit" class="send-btn" aria-label="Send">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                    </svg>
                </button>
            </form>
            <div class="status-bar" id="status"></div>
        </div>

    </div>

    <script>
        async function sendMessage(e) {
            e.preventDefault();
            const input    = document.getElementById('userInput');
            const chatbox  = document.getElementById('chatbox');
            const typing   = document.getElementById('typing');
            const apiKey   = document.getElementById('api_key').value;
            const statusEl = document.getElementById('status');
            const text     = input.value.trim();

            if (!text) return;

            if (!apiKey) {
                statusEl.textContent = 'API key required';
                statusEl.style.color = '#8b3a34';
                setTimeout(() => { statusEl.textContent = ''; statusEl.style.color = ''; }, 3000);
                return;
            }

            chatbox.innerHTML += `<div class="msg user-msg">${escapeHtml(text)}</div>`;
            input.value = '';
            chatbox.scrollTop = chatbox.scrollHeight;
            typing.classList.add('active');
            statusEl.textContent = '';

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-API-Key': apiKey },
                    body: JSON.stringify({ text })
                });

                const data = await response.json();
                typing.classList.remove('active');

                if (response.ok) {
                    chatbox.innerHTML += `<div class="msg bot-msg">${escapeHtml(data.response)}</div>`;
                    statusEl.textContent = `confidence ${data.confidence}  ·  tag ${data.tag}`;
                } else {
                    chatbox.innerHTML += `<div class="msg bot-msg error">${escapeHtml(data.error)}</div>`;
                }
            } catch (err) {
                typing.classList.remove('active');
                chatbox.innerHTML += `<div class="msg bot-msg error">Connection error — please try again.</div>`;
            }

            chatbox.scrollTop = chatbox.scrollHeight;
        }

        function escapeHtml(t) {
            return t
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }
    </script>
