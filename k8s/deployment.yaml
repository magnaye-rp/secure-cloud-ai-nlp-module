apiVersion: apps/v1
kind: Deployment
metadata:
  name: nlp-ai
  labels:
    app: nlp-ai
spec:
  replicas: 3                          # Availability - redundancy
  selector:
    matchLabels:
      app: nlp-ai
  template:
    metadata:
      labels:
        app: nlp-ai
    spec:
      containers:
      - name: nlp-ai
        image: YOUR-USERNAME/secure-cloud-ai-nlp-module:latest
        ports:
        - containerPort: 8000
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "1"
            memory: "1Gi"
        livenessProbe:                  # Availability
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 10
        securityContext:                # Confidentiality + Integrity
          runAsNonRoot: true
          readOnlyRootFilesystem: true
