apiVersion: apps/v1
kind: Deployment
metadata:
  name: nlp-service
  labels:
    app: nlp-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nlp-service
  template:
    metadata:
      labels:
        app: nlp-service
    spec:
      containers:
      - name: nlp-app
        image: docker.io/library/nlp-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000

        env:
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: api-secrets
              key: api-key
        - name: CONFIDENCE_THRESHOLD
          value: "0.35"
        - name: RATE_LIMIT
          value: "60/minute"
        - name: DATA_PATH
          value: "/app/training_data.json"

        # ── Resources (reduced — model now trains in <1s at startup) ──────────
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: nlp-service
spec:
  selector:
    app: nlp-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: NodePort
  # nodePort: 30080       # uncomment to pin the external port